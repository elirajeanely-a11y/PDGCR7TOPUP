<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDGCR7 TOPUP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }
        body { background-color: #f4f6f9; color: #333; padding-bottom: 60px; }
        header { background-color: #ffffff; box-shadow: 0 4px 6px rgba(0,0,0,0.05); padding: 20px; text-align: center; margin-bottom: 30px; }
        header h1 { color: #0046be; font-size: 28px; text-transform: uppercase; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 15px; }
        .section-title { font-size: 22px; color: #0046be; margin-bottom: 20px; border-left: 5px solid #0046be; padding-left: 10px; text-transform: uppercase; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .card { background: #ffffff; border-radius: 15px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.05); text-align: center; padding: 15px; }
        .card img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; }
        .btn-main { width: 100%; background-color: #2563eb; color: white; padding: 10px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; padding: 15px; }
        .modal-content { background-color: #ffffff; border-radius: 16px; width: 100%; max-width: 450px; padding: 20px; position: relative; }
        .close-modal { position: absolute; top: 15px; right: 15px; font-size: 24px; cursor: pointer; }
        .btn-submit { background-color: #22c55e; color: white; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; margin-top: 20px; cursor: pointer; }
        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; z-index: 999; text-decoration: none; }
    </style>
</head>
<body>
    <header><h1>PDGCR7 TOPUP</h1></header>
    <div class="container">
        <h2 class="section-title">Jwèt</h2>
        <div class="grid-container">
            <div class="card">
                <h3>FREE FIRE</h3>
                <button class="btn-main" onclick="openModal('Free Fire')">ACHTE</button>
            </div>
            <div class="card">
                <h3>PIN GARENA</h3>
                <button class="btn-main" onclick="openModal('PIN Garena')">ACHTE PIN</button>
            </div>
        </div>
    </div>
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <h2 id="modalTitle"></h2>
            <input type="text" id="playerID" placeholder="ID Jwè" style="width:100%; padding:10px; margin:10px 0;">
            <button class="btn-submit" onclick="sendOrder()">KONFIME SOU WHATSAPP</button>
        </div>
    </div>
    <a href="https://wa.me/50935304335" class="whatsapp-float"><i class="fab fa-whatsapp"></i></a>
    <script>
        let currentGame = "";
        function openModal(game) { currentGame = game; document.getElementById('modalTitle').innerText = game; document.getElementById('orderModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('orderModal').style.display = 'none'; }
        function sendOrder() { const id = document.getElementById('playerID').value; window.open(`https://wa.me/50935304335?text=Mwen vle ${currentGame}. ID: ${id}`); }
    </script>
</body>
</html>
