<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDGCR7 TOPUP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f0f4f9;
            color: #1e293b;
            padding-bottom: 80px;
        }

        /* HEADER BOUTIK PAM STYLE */
        header {
            background-color: #ffffff;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #e2e8f0;
        }

        .logo {
            font-size: 22px;
            font-weight: 900;
            color: #0046be;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: #1e3a8a;
        }

        .header-icons {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 20px;
            color: #64748b;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 15px;
        }

        /* SEARCH BAR */
        .search-container {
            position: relative;
            margin-bottom: 15px;
        }

        .search-container input {
            width: 100%;
            padding: 14px 40px 14px 45px;
            border: 1px solid #cbd5e1;
            border-radius: 50px;
            font-size: 15px;
            background-color: #ffffff;
            outline: none;
        }

        .search-container .fa-search {
            position: absolute;
            left: 18px;
            top: 16px;
            color: #94a3b8;
            font-size: 16px;
        }

        /* CATEGORIES BAR */
        .categories-tabs {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding: 5px 0 15px 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #e2e8f0;
        }

        .tab-item {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            background: transparent;
            border: none;
            font-size: 14px;
            font-weight: bold;
            color: #64748b;
            white-space: nowrap;
            cursor: pointer;
        }

        .tab-item.active {
            color: #0046be;
            border-bottom: 3px solid #0046be;
        }

        /* SECTION TITLE */
        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
            border-left: 4px solid #0046be;
            padding-left: 10px;
            text-transform: uppercase;
        }

        .product-count {
            font-size: 13px;
            color: #0046be;
            font-weight: bold;
            background-color: #eff6ff;
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* PRODUCT GRID */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .card {
            background: #ffffff;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
        }

        .image-container {
            width: 100%;
            height: 140px;
            position: relative;
            overflow: hidden;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .card-info {
            padding: 12px;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            flex-grow: 1;
        }

        .card-info h3 {
            font-size: 14px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .btn-main {
            background-color: #1d4ed8;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            width: 100%;
            transition: background 0.2s;
        }

        .btn-main:hover {
            background-color: #1e40af;
        }

        /* MODAL POPUP */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center; align-items: center;
            padding: 15px;
        }

        .modal-content {
            background-color: #ffffff;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: 15px; right: 15px;
            font-size: 24px; cursor: pointer; color: #64748b;
        }

        .modal-header h2 {
            font-size: 18px; color: #0f172a; margin-bottom: 15px; text-align: center;
        }

        .form-group input {
            width: 100%; padding: 12px;
            border: 1px solid #cbd5e1; border-radius: 12px;
            font-size: 15px; outline: none; margin-bottom: 15px;
        }

        .btn-submit {
            background-color: #22c55e; color: white;
            width: 100%; padding: 14px; border: none;
            border-radius: 12px; font-weight: bold; font-size: 15px;
            cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 8px;
        }

        /* FLOATING WHATSAPP */
        .whatsapp-float {
            position: fixed;
            bottom: 20px; right: 20px;
            background-color: #25d366; color: white;
            width: 60px; height: 60px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 30px; box-shadow: 0 4px 12px rgba(37,211,102,0.4);
            z-index: 999; text-decoration: none;
        }
    </style>
</head>
<body>

    <!-- TOP HEADER -->
    <header>
        <div class="logo">PDGCR7<span>TOPUP</span></div>
        <div class="header-icons">
            <i class="fas fa-shopping-cart"></i>
            <i class="fas fa-bars"></i>
        </div>
    </header>

    <div class="container">
        
        <!-- SEARCH SÈVIS -->
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Chèche yon sèvis...">
        </div>

        <!-- TABS KATEGORI -->
        <div class="categories-tabs">
            <button class="tab-item"><i class="fas fa-home"></i> Tout</button>
            <button class="tab-item active"><i class="fas fa-gamepad"></i> Jwèt</button>
            <button class="tab-item"><i class="fas fa-tv"></i> Netflix</button>
            <button class="tab-item"><i class="fas fa-gift"></i> Gif kat</button>
        </div>

        <!-- SECTION HEADER -->
        <div class="section-header">
            <h2 class="section-title">Jwèt</h2>
            <span class="product-count">5 pwodwi</span>
        </div>

        <!-- PRODUCT GRID (TÈT KOUPE AK SCREENSHOT LA) -->
        <div class="grid-container">
            
            <!-- FREE FIRE -->
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=500&q=80" alt="Free Fire">
                </div>
                <div class="card-info">
                    <h3>FREE FIRE</h3>
                    <button class="btn-main" onclick="openModal('Free Fire')">
                        <i class="fas fa-shopping-cart"></i> KLIKE LA
                    </button>
                </div>
            </div>

            <!-- BLOOD STRIKE -->
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1511512578047-dfb367046420?auto=format&fit=crop&w=500&q=80" alt="Blood Strike">
                </div>
                <div class="card-info">
                    <h3>BLOODE STRIKE</h3>
                    <button class="btn-main" onclick="openModal('Blood Strike')">
                        <i class="fas fa-shopping-cart"></i> KLIKE LA
                    </button>
                </div>
            </div>

            <!-- PUBG -->
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1538481199705-c710c4e965fc?auto=format&fit=crop&w=500&q=80" alt="PUBG">
                </div>
                <div class="card-info">
                    <h3>PUBG</h3>
                    <button class="btn-main" onclick="openModal('PUBG')">
                        <i class="fas fa-shopping-cart"></i> KLIKE LA
                    </button>
                </div>
            </div>

            <!-- ROBLOX -->
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1607604276583-eef5d076aa5f?auto=format&fit=crop&w=500&q=80" alt="Roblox">
                </div>
                <div class="card-info">
                    <h3>ROBLOX</h3>
                    <button class="btn-main" onclick="openModal('Roblox')">
                        <i class="fas fa-shopping-cart"></i> KLIKE LA
                    </button>
                </div>
            </div>

            <!-- PIN GARENA -->
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1614680376593-902f74fa0d41?auto=format&fit=crop&w=500&q=80" alt="PIN Garena">
                </div>
                <div class="card-info">
                    <h3>PIN GARENA</h3>
                    <button class="btn-main" onclick="openModal('PIN Garena')">
                        <i class="fas fa-shopping-cart"></i> KLIKE LA
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- MODAL BOX -->
    <div class="modal" id="orderModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-header">
                <h2 id="modalGameTitle">KÒMAND</h2>
            </div>
            <div class="form-group">
                <input type="text" id="playerID" placeholder="Mete ID Jwè ou la a...">
            </div>
            <button class="btn-submit" onclick="sendOrder()">
                <i class="fab fa-whatsapp"></i> KONFIME SOU WHATSAPP
            </button>
        </div>
    </div>

    <!-- FLOATING WHATSAPP -->
    <a href="https://wa.me/50935304335" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        let selectedGame = "";

        function openModal(gameName) {
            selectedGame = gameName;
            document.getElementById('modalGameTitle').innerText = "ACHTE " + gameName.toUpperCase();
            document.getElementById('playerID').value = "";
            document.getElementById('orderModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function sendOrder() {
            const idJwe = document.getElementById('playerID').value.trim();
            const nimewoMwen = "50935304335";
            
            if(!idJwe) {
                alert("Tanpri antre ID ou!");
                return;
            }

            const mesaj = `Bonjou *PDGCR7 TOPUP*, mwen vle achte kòd/topup pou:\n\n🎮 *Jwèt:* ${selectedGame}\n🆔 *ID:* ${idJwe}\n\nBan m enfòmasyon peman an tanpri.`;
            window.open(`https://wa.me/${nimewoMwen}?text=${encodeURIComponent(mesaj)}`, '_blank');
        }

        window.onclick = function(event) {
            if (event.target == document.getElementById('orderModal')) {
                document.getElementById('orderModal').style.display = "none";
            }
        }
    </script>
</body>
</html>
