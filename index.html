        label { display: block; text-align: left; margin-top: 15px; font-weight: bold; color: #ff6600; }
        input, select, .btn-main { width: 100%; padding: 12px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; font-size: 16px; }

<script>

function louvriFom(nonJwet) {
