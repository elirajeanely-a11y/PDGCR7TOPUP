<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDGCR7 TOPUP</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #f0f4f9; color: #1e293b; padding-bottom: 80px; }
        
        header { background-color: #ffffff; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #e2e8f0; }
        .logo { font-size: 22px; font-weight: 900; color: #0046be; }
        .logo span { color: #1e3a8a; }
        .header-icons { display: flex; align-items: center; gap: 15px; font-size: 20px; color: #64748b; }

        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        
        .search-container { position: relative; margin-bottom: 15px; }
        .search-container input { width: 100%; padding: 14px 45px; border: 1px solid #cbd5e1; border-radius: 50px; font-size: 15px; }
        .search-container .fa-search { position: absolute; left: 18px; top: 16px; color: #94a3b8; }

        .categories-tabs { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid #e2e8f0; }
        .tab-item { padding: 8px 16px; background: transparent; border: none; font-size: 14px; font-weight: bold; color: #64748b; white-space: nowrap; }
        .tab-item.active { color: #0046be; border-bottom: 3px solid #0046be; }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-title { font-size: 20px; font-weight: 800; border-left: 4px solid #0046be; padding-left: 10px; }
        .product-count { font-size: 13px; color: #0046be; font-weight: bold; background-color: #eff6ff; padding: 4px 10px; border-radius: 20px; }

        .grid-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .card { background: #ffffff; border-radius: 24px; overflow: hidden; border: 1px solid #e2e8f0; display: flex; flex-direction: column; }
        .image-container { width: 100%; height: 140px; }
        .card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { padding: 12px; text-align: center; }
        .card-info h3 { font-size: 14px; font-weight: 800; margin-bottom: 12px; }
        
        .btn-main { background-color: #1d4ed8; color: white; padding: 10px; border: none; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }

        /* MODAL FULLSCREEN */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-color: #f0f4f9; z-index: 1000; overflow-y: auto; padding: 15px; }
        .modal-body { max-width: 500px; margin: 0 auto; background: #f0f4f9; padding-bottom: 40px; }
        .modal-nav { display: flex; align-items: center; justify-content: space-between; padding: 15px 0; margin-bottom: 15px; }
        .back-btn { font-size: 22px; cursor: pointer; color: #0f172a; }

        /* BLÒK ETAP YO */
        .step-box { background: white; border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .step-number { background: #1d4ed8; color: white; width: 28px; height: 28px; border-radius: 6px; display: inline-flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 10px; }
        .step-title { font-size: 18px; font-weight: 800; color: #0f172a; margin-bottom: 15px; display: flex; align-items: center; }
        
        .id-input-container { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
        .id-input-container input { flex-grow: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; font-size: 15px; outline: none; }
        .btn-verify { background: #1d4ed8; color: white; border: none; padding: 12px 15px; border-radius: 10px; font-weight: bold; font-size: 12px; cursor: pointer; min-width: 100px; }
        
        .verify-result { font-size: 13px; font-weight: bold; margin-top: 8px; display: none; }
        .verify-success { color: #22c55e; }
        .verify-error { color: #ef4444; }
        
        .badge-delivery { color: #22c55e; font-size: 13px; font-weight: bold; display: flex; align-items: center; gap: 5px; margin-top: 10px; }

        /* DYAMAN */
        .diamond-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .diamond-card { background: white; border: 1px solid #e2e8f0; border-radius: 16px; padding: 15px; text-align: center; position: relative; cursor: pointer; }
        .diamond-card i { font-size: 28px; color: #38bdf8; margin-bottom: 10px; display: block; }
        .diamond-qty { font-size: 14px; font-weight: 800; color: #1e293b; }
        .diamond-old-price { font-size: 11px; text-decoration: line-through; color: #94a3b8; margin: 4px 0; }
        .diamond-price { font-size: 14px; font-weight: 800; color: #0046be; }
        .discount-badge { position: absolute; top: -5px; right: -5px; background: #ef4444; color: white; font-size: 10px; font-weight: bold; padding: 2px 6px; border-radius: 20px; }

        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background-color: #25d366; color: white; width: 60px; height: 60px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 30px; z-index: 999; }
    </style>
</head>
<body>

    <header>
        <div class="logo">PDGCR7<span>TOPUP</span></div>
        <div class="header-icons"><i class="fas fa-shopping-cart"></i><i class="fas fa-bars"></i></div>
    </header>

    <div class="container">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Chèche yon sèvis...">
        </div>

        <div class="categories-tabs">
            <button class="tab-item"><i class="fas fa-home"></i> Tout</button>
            <button class="tab-item active"><i class="fas fa-gamepad"></i> Jwèt</button>
            <button class="tab-item"><i class="fas fa-tv"></i> Netflix</button>
            <button class="tab-item"><i class="fas fa-gift"></i> Gif kat</button>
        </div>

        <div class="section-header">
            <h2 class="section-title">Jwèt</h2>
            <span class="product-count">2 pwodwi</span>
        </div>

        <div class="grid-container">
            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?auto=format&fit=crop&w=500&q=80">
                </div>
                <div class="card-info">
                    <h3>FREE FIRE</h3>
                    <button class="btn-main" onclick="openModal('Free Fire')"><i class="fas fa-shopping-cart"></i> KLIKE LA</button>
                </div>
            </div>

            <div class="card">
                <div class="image-container">
                    <img src="https://images.unsplash.com/photo-1614680376593-902f74fa0d41?auto=format&fit=crop&w=500&q=80">
                </div>
                <div class="card-info">
                    <h3>PIN GARENA</h3>
                    <button class="btn-main" onclick="openModal('PIN Garena')"><i class="fas fa-shopping-cart"></i> KLIKE LA</button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODAL DETAY -->
    <div class="modal" id="orderModal">
        <div class="modal-body">
            <div class="modal-nav">
                <i class="fas fa-arrow-left back-btn" onclick="closeModal()"></i>
                <h3 id="modalGameTitle" style="font-weight: 800; color: #0046be;">- PDGCR7 TOPUP</h3>
                <div style="width:22px;"></div>
            </div>

            <!-- ETAP 1: KONT OU -->
            <div class="step-box">
                <div class="step-title"><span class="step-number">1</span> Kont ou</div>
                <label style="font-size: 14px; font-weight: bold; margin-bottom: 8px; display: block;">ID Jwè <span style="color:red;">*</span></label>
                <div class="id-input-container">
                    <input type="text" id="playerID" placeholder="Antre ID jwè ou...">
                    <button class="btn-verify" id="verifyBtn" onclick="simulateVerification()">VERIFYE ID</button>
                </div>
                <!-- Seksyon mesaj verifikasyon an -->
                <div id="verifyStatus" class="verify-result"></div>
                <div class="badge-delivery"><i class="fas fa-check-circle"></i> LIVREZON IMEDYA</div>
            </div>

            <!-- ETAP 2: KANTITE DYAMAN -->
            <div class="step-box">
                <div class="step-title"><span class="step-number">2</span> Kantite dyaman</div>
                
                <div class="diamond-grid">
                    <div class="diamond-card" onclick="selectDiamonds('100 + 10 bonis', '153.99 G')">
                        <div class="discount-badge">-9%</div>
                        <i class="fas fa-gem"></i>
                        <div class="diamond-qty">100 + 10 bonis</div>
                        <div class="diamond-old-price">170.00 G</div>
                        <div class="diamond-price">153.99 G</div>
                    </div>
                    <div class="diamond-card" onclick="selectDiamonds('310 + 31 bonis', '459.99 G')">
                        <div class="discount-badge">-8%</div>
                        <i class="fas fa-gem"></i>
                        <div class="diamond-qty">310 + 31 bonis</div>
                        <div class="diamond-old-price">500.00 G</div>
                        <div class="diamond-price">459.99 G</div>
                    </div>
                    <div class="diamond-card" onclick="selectDiamonds('520 + 52 bonis', '759.99 G')">
                        <div class="discount-badge">-5%</div>
                        <i class="fas fa-gem"></i>
                        <div class="diamond-qty">520 + 52 bonis</div>
                        <div class="diamond-old-price">800.00 G</div>
                        <div class="diamond-price">759.99 G</div>
                    </div>
                    <div class="diamond-card" onclick="selectDiamonds('1060 + 106 bonis', '1499.99 G')">
                        <div class="discount-badge">-6%</div>
                        <i class="fas fa-gem"></i>
                        <div class="diamond-qty">1060 +106 bonis</div>
                        <div class="diamond-old-price">1,600.00 G</div>
                        <div class="diamond-price">1,499.99 G</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/50935304335" class="whatsapp-float" target="_blank"><i class="fab fa-whatsapp"></i></a>

    <script>
        let selectedGame = "";
        let idVerified = false;

        function openModal(gameName) {
            selectedGame = gameName;
            document.getElementById('modalGameTitle').innerText = "- " + gameName;
            document.getElementById('playerID').value = "";
            idVerified = false;
            
            const statusDiv = document.getElementById('verifyStatus');
            statusDiv.style.display = "none";
            statusDiv.innerHTML = "";
            
            document.getElementById('orderModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('orderModal').style.display = 'none';
        }

        function simulateVerification() {
            const idInput = document.getElementById('playerID').value.trim();
            const btn = document.getElementById('verifyBtn');
            const statusDiv = document.getElementById('verifyStatus');

            if (!idInput) {
                statusDiv.style.display = "block";
                statusDiv.className = "verify-result verify-error";
                statusDiv.innerHTML = "<i class='fas fa-times-circle'></i> Tanpri antre yon ID anvan!";
                return;
            }

            btn.innerText = "Y ap chèche...";
            btn.disabled = true;

            setTimeout(() => {
                btn.innerText = "VERIFYE ID";
                btn.disabled = false;
                idVerified = true;
                
                statusDiv.style.display = "block";
                statusDiv.className = "verify-result verify-success";
                statusDiv.innerHTML = "<i class='fas fa-check-circle'></i> ID verifye pafè! Kont lan pare pou resevwa chajman an.";
            }, 1000);
        }

        function selectDiamonds(packName, price) {
            const idJwe = document.getElementById('playerID').value.trim();
            const nimewoWhatsApp = "50935304335";

            if (!idJwe) {
                alert("Tanpri antre ID Jwè ou anvan nan Etap 1!");
                return;
            }
            
            if (!idVerified) {
                alert("Tanpri klike sou bouton 'VERIFYE ID' la anvan pou w asire w li bon!");
                return;
            }

            const mesaj = `Bonjou *PDGCR7 TOPUP*, mwen fin verifye ID mwen sou sit la e mwen vle fè yon kòmand:\n\n🎮 *Jwèt:* ${selectedGame}\n🆔 *ID Jwè:* ${idJwe}\n💎 *Kantite:* ${packName}\n💵 *Pri:* ${price}\n\nBan m kote pou m voye kòb la tanpri!`;
            window.open(`https://wa.me/${nimewoWhatsApp}?text=${encodeURIComponent(mesaj)}`, '_blank');
        }
    </script>
</body>
</html>
